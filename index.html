<!DOCTYPE html>

<title>Büşra Karabaş Dijital Kartvizit</title>

<style>

body{
font-family:Arial;
background:#f0f0f0;
margin:0;
text-align:center;
}

/* kırmızı üst alan */

.header{
background:#c8102e;
height:220px;
display:flex;
justify-content:center;
align-items:center;
}

.logo img{
width:160px;
}

/* kart */

.card{
background:white;
width:350px;
margin:-60px auto 40px auto;
padding:30px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,0.15);
}

/* profil */

.profile{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
margin-top:10px;
border:4px solid white;
}

/* başlık */

h2{
margin-top:15px;
}

p{
color:#555;
margin-bottom:25px;
}

/* butonlar */

.buttons{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
}

.btn{
padding:15px;
background:#f0f0f0;
border-radius:12px;
text-decoration:none;
color:black;
font-weight:bold;
transition:0.2s;
}

.btn:hover{
background:#e0e0e0;
}

/* rehbere kaydet */

.save-btn{
grid-column:1 / span 2;
text-align:center;
background:#c8102e;
color:white;
}

.save-btn:hover{
background:#a50c24;
}

</style>

</head>
