<style>

/* genel */

body{
font-family:Arial, Helvetica, sans-serif;
background:#f0f0f0;
margin:0;
text-align:center;
}

/* kırmızı üst alan */

.header{
background:#c8102e;
height:220px;
display:flex;
justify-content:center;
align-items:center;
}

.logo img{
width:150px;
}

/* kart */

.card{
background:white;
width:90%;
max-width:360px;
margin:-70px auto 40px auto;
padding:30px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,0.15);
}

/* profil */

.profile{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
border:4px solid white;
margin-top:10px;
box-shadow:0 8px 25px rgba(0,0,0,0.2);
}

/* yazılar */

h2{
margin-top:15px;
font-size:22px;
}

p{
color:#555;
margin-bottom:25px;
font-size:14px;
}

/* butonlar */

.buttons{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
}

.btn{
padding:14px;
background:#f0f0f0;
border-radius:12px;
text-decoration:none;
color:black;
font-weight:bold;
transition:0.2s;
font-size:14px;
}

.btn:hover{
background:#e0e0e0;
}

/* rehbere kaydet */

.save-btn{
grid-column:1 / span 2;
background:#c8102e;
color:white;
}

.save-btn:hover{
background:#a50c24;
}

</style>

</head>

<body>

<div class="header">
<div class="logo">
<img src="https://rems.realtyworld.com.tr/assets/global/img/logo-login.png">
</div>
</div>

<div class="card">

<img src="https://i.imgur.com/anhSyTy.jpeg" class="profile">

Gayrimenkul Danışmanı / Realty World Vega Gayrimenkul
</p>

<i class="fa-solid fa-envelope"></i> Mail
</a>

<a class="btn" href="https://vega.realtyworld.com.tr/" target="_blank">
<i class="fa-solid fa-globe"></i> Website
</a>

<a class="btn" href="https://maps.app.goo.gl/Dm9aHJPqBPmXXPQB9" target="_blank">
<i class="fa-solid fa-location-dot"></i> Konum

Rehbere Kaydet
</a>
